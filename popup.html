<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@500;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0c0c0e;
      --bg2: #131316;
      --bg3: #1a1a1f;
      --bg4: #222228;
      --border: #2a2a32;
      --border2: #33333d;
      --text: #f0f0f5;
      --text2: #9090a0;
      --text3: #55556a;
      --accent: #e8ff6e;
      --accent2: #b8cc50;
      --accent-dim: rgba(232, 255, 110, 0.08);
      --red: #ff5f5f;
      --green: #5fff9a;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      user-select: none;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.3px;
    }

    .logo-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .open-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--text3);
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .open-btn:hover {
      color: var(--text);
      border-color: var(--text3);
    }

    /* ── IDLE STATE ── */
    .idle-state {
      padding: 32px 20px;
      text-align: center;
      display: none;
    }

    .idle-state.visible {
      display: block;
    }

    .idle-icon {
      font-size: 28px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .idle-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text2);
      margin-bottom: 6px;
    }

    .idle-sub {
      font-size: 11px;
      color: var(--text3);
      line-height: 1.6;
    }

    /* ── ACTIVE STATE ── */
    .active-state {
      display: none;
      flex-direction: column;
      padding: 20px 20px 18px;
      gap: 0;
    }

    .active-state.visible {
      display: flex;
    }

    /* Project + objective meta */
    .meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 18px;
    }

    .project-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: 0.5px;
    }

    .project-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .obj-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Big countdown */
    .countdown {
      font-family: 'DM Mono', monospace;
      font-size: 52px;
      font-weight: 300;
      letter-spacing: -3px;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
      transition: color 0.3s;
      text-align: center;
    }

    .countdown.warning {
      color: #ffaa5f;
    }

    .countdown.danger {
      color: var(--red);
    }

    /* Progress bar */
    .progress {
      width: 100%;
      height: 2px;
      background: var(--bg4);
      border-radius: 2px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 1s linear, background 0.3s;
    }

    .progress-fill.warning {
      background: #ffaa5f;
    }

    .progress-fill.danger {
      background: var(--red);
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .btn {
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: 'Syne', sans-serif;
      border-radius: 50%;
    }

    .btn-play {
      width: 52px;
      height: 52px;
      background: var(--accent);
      color: var(--bg);
      font-size: 18px;
      box-shadow: 0 0 0 0 rgba(232, 255, 110, 0.3);
    }

    .btn-play:hover {
      background: var(--accent2);
      transform: scale(1.05);
    }

    .btn-play.running {
      animation: pulse 2s ease-out infinite;
    }

    .btn-sm {
      width: 38px;
      height: 38px;
      font-size: 14px;
    }

    .btn-reset {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
    }

    .btn-reset:hover {
      color: var(--text);
      background: var(--bg4);
    }

    .btn-done {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--green);
      font-size: 16px;
    }

    .btn-done:hover {
      background: rgba(95, 255, 154, 0.08);
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(232, 255, 110, 0.3);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(232, 255, 110, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(232, 255, 110, 0);
      }
    }

    /* ── FOOTER ── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-stat {
      font-size: 10px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
    }

    .footer-stat span {
      color: var(--text2);
    }

    .done-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--green);
      font-weight: 700;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      z-index: 99;
      transition: transform 0.25s;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo"><span class="logo-dot"></span>FocusTrack</div>
    <button class="open-btn" onclick="openFullApp()">Open App ↗</button>
  </div>

  <!-- IDLE (no active objective) -->
  <div class="idle-state" id="idle-state">
    <div class="idle-icon">⏱</div>
    <div class="idle-title">No active session</div>
    <div class="idle-sub">Open the app to select a project<br>and start an objective.</div>
  </div>

  <!-- ACTIVE (objective running) -->
  <div class="active-state" id="active-state">
    <div class="meta">
      <div class="project-tag">
        <div class="project-dot" id="proj-dot"></div>
        <span id="proj-name">—</span>
      </div>
      <div class="obj-name" id="obj-name">—</div>
    </div>

    <div class="countdown" id="countdown">00:00:00</div>
    <div class="progress">
      <div class="progress-fill" id="progress-fill" style="width:100%"></div>
    </div>

    <div class="controls">
      <button class="btn btn-sm btn-reset" id="btn-reset" onclick="resetTimer()" title="Reset">↺</button>
      <button class="btn btn-play" id="btn-play" onclick="toggleTimer()">▶</button>
      <button class="btn btn-sm btn-done" id="btn-done" onclick="completeObjective()" title="Mark complete">✓</button>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-stat">Today: <span id="today-hours">0h 0m</span></div>
    <div class="footer-stat">Sessions: <span id="session-count">0</span></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── STORAGE HELPERS (chrome.storage.local mirrors localStorage) ──
    const STORE_KEY = 'focustrack_v1';

    async function loadState() {
      return new Promise(resolve => {
        chrome.storage.local.get([STORE_KEY], res => {
          try { resolve(JSON.parse(res[STORE_KEY] || '{}')); }
          catch { resolve({}); }
        });
      });
    }

    async function saveState(state) {
      return new Promise(resolve => {
        chrome.storage.local.set({ [STORE_KEY]: JSON.stringify(state) }, resolve);
      });
    }

    // ── LOCAL STATE ──
    let state = {};
    let tickInterval = null;

    // ── INIT ──
    async function init() {
      state = await loadState();
      render();
      // If timer was running, resume local tick
      if (state.timerRunning && state.timerLeft > 0) {
        startLocalTick();
      }
    }

    // ── RENDER ──
    function render() {
      const hasActive = !!(state.activeObjId && state.objectives);
      const obj = hasActive ? (state.objectives || []).find(o => o.id === state.activeObjId) : null;
      const proj = obj ? (state.projects || []).find(p => p.id === obj.projectId) : null;

      document.getElementById('idle-state').classList.toggle('visible', !obj || obj.completed);
      document.getElementById('active-state').classList.toggle('visible', !!(obj && !obj.completed));

      if (obj && !obj.completed) {
        document.getElementById('proj-dot').style.background = proj ? proj.color : '#e8ff6e';
        document.getElementById('proj-name').textContent = proj ? proj.name : '—';
        document.getElementById('obj-name').textContent = obj.name;

        const left = state.timerLeft ?? obj.estimatedSecs;
        const total = state.timerTotal ?? obj.estimatedSecs;
        document.getElementById('countdown').textContent = fmtCountdown(left);

        const pct = total > 0 ? (left / total) * 100 : 0;
        document.getElementById('progress-fill').style.width = pct + '%';

        const warn = pct < 25 && pct > 10;
        const danger = pct <= 10;
        document.getElementById('countdown').className = 'countdown' + (danger ? ' danger' : warn ? ' warning' : '');
        document.getElementById('progress-fill').className = 'progress-fill' + (danger ? ' danger' : warn ? ' warning' : '');

        const playBtn = document.getElementById('btn-play');
        playBtn.textContent = state.timerRunning ? '⏸' : '▶';
        playBtn.classList.toggle('running', !!state.timerRunning);
      }

      // Footer stats
      const today = todayStr();
      const sessions = state.sessions || [];
      const todaySecs = sessions.filter(s => s.date === today).reduce((a, s) => a + s.actualSecs, 0);
      const h = Math.floor(todaySecs / 3600);
      const m = Math.floor((todaySecs % 3600) / 60);
      document.getElementById('today-hours').textContent = `${h}h ${m}m`;
      document.getElementById('session-count').textContent = sessions.filter(s => s.date === today).length;
    }

    // ── TIMER ──
    function toggleTimer() {
      if (state.timerRunning) {
        pauseTimer();
      } else {
        startTimer();
      }
    }

    function startTimer() {
      state.timerRunning = true;
      if (!state.timerLeft || state.timerLeft <= 0) {
        const obj = (state.objectives || []).find(o => o.id === state.activeObjId);
        if (obj) { state.timerLeft = obj.estimatedSecs; state.timerTotal = obj.estimatedSecs; }
      }
      saveState(state);
      startLocalTick();
      render();
    }

    function startLocalTick() {
      clearInterval(tickInterval);
      tickInterval = setInterval(async () => {
        if (!state.timerRunning) { clearInterval(tickInterval); return; }
        if (state.timerLeft <= 0) {
          state.timerRunning = false;
          state.timerLeft = 0;
          clearInterval(tickInterval);
          await saveState(state);
          render();
          playChime('alert');
          toast('⏰ Time is up!');
          return;
        }
        state.timerLeft--;
        await saveState(state);
        render();
      }, 1000);
    }

    function pauseTimer() {
      state.timerRunning = false;
      clearInterval(tickInterval);
      saveState(state);
      render();
    }

    function resetTimer() {
      state.timerRunning = false;
      clearInterval(tickInterval);
      const obj = (state.objectives || []).find(o => o.id === state.activeObjId);
      if (obj) { state.timerLeft = obj.estimatedSecs; state.timerTotal = obj.estimatedSecs; }
      saveState(state);
      render();
    }

    async function completeObjective() {
      const obj = (state.objectives || []).find(o => o.id === state.activeObjId);
      if (!obj) return;
      const actualSecs = (state.timerTotal || obj.estimatedSecs) - (state.timerLeft || 0);
      if (actualSecs < 5) { toast('Start the timer first'); return; }

      clearInterval(tickInterval);
      state.timerRunning = false;
      obj.completed = true;

      if (!state.sessions) state.sessions = [];
      state.sessions.push({
        id: uid(),
        projectId: obj.projectId,
        objectiveName: obj.name,
        estimatedSecs: obj.estimatedSecs,
        actualSecs,
        date: todayStr(),
        completedAt: Date.now(),
      });

      state.activeObjId = null;
      state.timerLeft = 0;
      state.timerTotal = 0;
      await saveState(state);
      render();
      playChime('done');
      toast('✓ Session logged!');
    }

    // ── OPEN FULL APP ──
    function openFullApp() {
      // Opens the hosted web app in a new tab
      // Replace this URL with your GitHub Pages URL once deployed
      const APP_URL = 'https://Collins-01.github.io/focustrack/';
      chrome.tabs.create({ url: APP_URL });
    }

    // ── UTILS ──
    function playChime(type = 'done') {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const notes = type === 'done'
          ? [{ f: 523.25, t: 0, d: 0.5 }, { f: 659.25, t: 0.18, d: 0.5 }, { f: 783.99, t: 0.36, d: 0.8 }]
          : [{ f: 440, t: 0, d: 0.3 }, { f: 349.23, t: 0.2, d: 0.6 }];
        notes.forEach(({ f, t, d }) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(f, ctx.currentTime + t);
          gain.gain.setValueAtTime(0, ctx.currentTime + t);
          gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + t + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + d);
          osc.start(ctx.currentTime + t);
          osc.stop(ctx.currentTime + t + d);
        });
      } catch (e) { /* audio not available */ }
    }

    // ── UTILS ──
    function fmtCountdown(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      return `${pad(h)}:${pad(m)}:${pad(s)}`;
    }
    function pad(n) { return String(n).padStart(2, '0'); }
    function todayStr() { return new Date().toISOString().slice(0, 10); }
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }

    // ── START ──
    init();
  </script>
</body>

</html>
